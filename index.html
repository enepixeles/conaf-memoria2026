<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector de EPUB</title>
    
    <!-- Librería JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <!-- Librería ePub.js -->
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #viewer {
            width: 100%;
            max-width: 800px;
            height: 70vh;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Mi Lector EPUB Web</h2>
    <div id="viewer"></div>

    <div class="controls">
        <button id="prev">⬅ Anterior</button>
        <button id="next">Siguiente ➡</button>
    </div>

    <script>
        // ==========================================
        // AQUÍ COLOCAS EL VÍNCULO O RUTA A TU EPUB
        // ==========================================
        const urlDelEpub = "MEMORIA-WEB-02.epub"; // Puede ser una URL (https://...) o una ruta local
        
        // Inicializamos el libro con esa ruta
        const book = ePub(urlDelEpub);

        // Renderizamos el libro dentro del div "viewer"
        const rendition = book.renderTo("viewer", {
            width: "100%",
            height: "100%",
            spread: "none"
        });

        // Mostramos el libro
        rendition.display();

        // Controles de botones
        document.getElementById('next').onclick = () => rendition.next();
        document.getElementById('prev').onclick = () => rendition.prev();

        // Controles de teclado
        document.addEventListener("keyup", function(e) {
            if (e.key === "ArrowRight") rendition.next();
            if (e.key === "ArrowLeft") rendition.prev();
        }, false);
    </script>

</body>
</html>
